---
- summary: |
    Добавление товара в корзину
  requirement: |
    При нажатии кнопки "В корзину" товар должен оказаться в корзине
  prerequisites: |
    Открыта страница интернет-магазина
  test-data: |
      Essence Mascara Lash Princess
  steps:
   - Нажать "В корзину" на выбранном товаре
   - Перейти в корзину
  expected-result: |
    В корзине должен отобразиться выбранный товар

- summary: |
    Сортировка по категориям
  requirement: | 
    При выборе категории в списке должны остаться только подходящие под нее 
  prerequisites: |
    Открыть страницу магазина
  test-data: |
    no-data
  steps:
   - Раскрыть выпадающий список категорий
   - Выбрать подходящюю
  expected-result: |
    В списке категории должны остаться только подходящие под нее

- summary: |
    Оформление заказа
  requirement: | 
    Должна быть возможность оформить заказ
  prerequisites: |
    no-data
  test-data: |
    no-data
  steps:
    - Открыть корзину с товарами
    - Нажать кнопку checkout
  expected-result: |
    Открытие окна для оплаты и оформления заказа

