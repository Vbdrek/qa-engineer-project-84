---
- summary: |
    Добавление товара в корзину
  requirement: |
    При клике на выбраный товар, он должен появиться в корзине
  prerequisites: |
    Открыта страница интернет-магазина
  steps:
   - Кликаем на выбраный товар
   - Открываем корзину
  expected-result: |
    На странице корзины должен отобразиться выбраный товар

- summary: |
    
  requirement: |
    При неправильном логине или пароле пользователь должен получить сообщение об ошибке
  prerequisites:
    Открыта страница логина
  test-data: |
    Логин = Qwerty Пароль = 123456
  steps:
    - Вводим логин
    - Вводим пароль
    - Нажимаем кнопку «Войти»
  expected-result: |
    Пользователь должен попасть на главную страницу
