---
- summary: |
    Добавление товара в корзину
  requirement: |
    При клике на кнопку "В корзину" товар добавляется в корзину
  prerequisites: |
    Открыта страница интернет-магазина
  steps:
   - Кликаем на выбраный товар
   - Открывается страница товара
   - Кликаем на кнопку "В корзину"
  expected-result: |
    На странице корзины должен отобразиться выбраный товар
