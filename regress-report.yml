bugreports:
  - summary: |
      Во второй версии интернет-магазина ошибка в смене языка интерфейса
    steps-to-reproduce: |
      1. Открыть страницу 2й версии интернет-магазина
      2. Сменить язык интерфейса с английского на русский/испанский
      3. Нажать на кнопку "Магазин"
    expected-result: |
      Выбраный язык не должен меняться
    actual-result: |
      Язык интерфейса при нажвтии кнопки "Магазин" возвращатеся к английскому
