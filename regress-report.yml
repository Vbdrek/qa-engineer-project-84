bugreports:
  - summary: |
      Самопроизвольная сменя языка интерфейса на странице интернет-магазина
    steps-to-reproduce: |
      1. Открыть страницу интернет-магазина
      2. Сменить язык интерфейса с "English" на "Русский" или "Spanish"
      3. Нажать на кнопку "Магазин"
    expected-result: |
      Выбраный язык не должен меняться
    actual-result: |
      Язык интерфейса при нажатии кнопки "Магазин" становится "English"
