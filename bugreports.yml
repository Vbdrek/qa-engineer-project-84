---
- summary: |
   Добавление товара в корзину
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть каталог товаров
    2. Выбрать нужный товар и нажать кнопку "В корзину"
    3. Обратить внимание на "Корзина" где появляется единица выбраного товара
  expected-result: |
    В "Корзина" появится + одна единица
  actual-result: |
    В "Корзина" появилась + одна единица
    
- summary: |
    Сортировка по категориям
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. На главной странице во вкладке категории выбрать к примеру "skin-care"
    2. При выборе производители не подходящих категорий остались
  expected-result: |
    В списке производителей останутся только подходящие под выбраную категорию
  actual-result: |
    Список производителей остаётся без изменений
  
- summary: |
    Оформление заказа
 environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. В корзине нажать "Оформить заказ"
  expected-result: |
    Должно появиться контекстное меню для заполнения оичных данных чтобы оформить заказ 
  actual-result: |
    Открывается уведомление о успешном заказе с кнопкой "Закрыть"

- summary: |
    Язык интерфейса
 environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Во вкладке "Language" выбрать "Russian"
  expected-result: |
    Полностью весь интерфейс страницы станет на русском
  actual-result: |
    Интерфейс не весь на русском языке

- summary: |
    Отображение страницы приложения на мобильном устройстве
  environment: |
    Эмулятор мобильного устройства в Chrome DevTools 
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть гоавную страницу приложения
    2. Запустить DevTools и прейти в корзину с товаром
    3. Внимние на границы текста и кнопок
  expected-result: |
    На устройстве страница должна отображаться чётко, надписи в границах, не должно быть заступов
  actual-result: |
    Некоторые элементы обрезаются, текст накладывается друг на друга, масштабирование работает некорректно
