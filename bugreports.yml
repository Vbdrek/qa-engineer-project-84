---
- summary: |
   Добавление товара в корзину
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть каталог товаров
    2. Выбрать нужный товар и нажать кнопку "В корзину"
    3. Обратить внимание на "Корзина" где появляется единица выбраного товара
  expected-result: |
    В "Корзина" появится + одна единица
  actual-result: |
    В "Корзина" появилась + одна единица
    
- summary: |
    Сортировка по категориям
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. На главной странице во вкладке категории выбрать к примеру "skin-care"
    2. При выборе производители не подходящих категорий остались
  expected-result: |
    В списке производителей останутся только подходящие под выбраную категорию
  actual-result: |
    Список производителей остаётся без изменений
  
- summary: |
    Оформление заказа
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. В корзине нажать "Оформить заказ"
  expected-result: |
    Должно появиться контекстное меню для заполнения оичных данных чтобы оформить заказ 
  actual-result: |
    Открывается уведомление о успешном заказе с кнопкой "Закрыть"

- summary: |
    Язык интерфейса
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Во вкладке "Language" выбрать "Russian"
  expected-result: |
    Полностью весь интерфейс страницы станет на русском
  actual-result: |
    Интерфейс не весь на русском языке

- summary: |
    Страница корзины отображается некорректно на мобильном устройстве
  environment: |
    Эмулятор мобильного устройства в Chrome DevTools 
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть главную страницу приложения
    2. Включить эмуляцию мобильного устройства в DevTools
    3. Открыть страницу корзины с товаром
    4. Проверить отображение текста и кнопок на экране
  expected-result: |
    Интерфейс корректно отображается на мобильном устройстве
  actual-result: |
    Часть элементов отбражается некорректно: текст накладывается, элементы обрезаются, масштабирование работает неправильно

- summary: |
     Строка поиска
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. В строке поиска ввести первую букву
  expected-result: |
      Фильтрация каталога по первой букве
  actual-result: |
      Каталог товаров фильтруется со всеми товарами с введённой буквой

- summary: |
     Хештег с переходом в категорию
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Открыть страницу товара
      2. Нажать на хештег с категорией
  expected-result: |
      Переход на страницу товаров по выбраному хештегу
  actual-result: |
      Ничего не происходит 

- summary: |
     Закрытие окна оформления заказа
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Добавить товар в корзину
      2. Перейти в корзину и нажать оформление заказа
      3. Закрыть прявившееся окно с помощью крестика
  expected-result: |
      Окно закроется
  actual-result: |
      Окно не закрывается
