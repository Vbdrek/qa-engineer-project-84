---
- summary: |
    Фильтр по категории не работает
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть главную страницу магазина
    2. Откртыть список категорий
    3. Выбрать категорию 
  expected-result: |
    Список товаров фильтруется по выбранной
  actual-result: |
    Список товаров не меняется
  
- summary: |
    Заказ не оформляется
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. В корзине нажать "Оформить заказ"
  expected-result: |
    Должно появиться контекстное меню для заполнения личных данных чтобы оформить заказ 
  actual-result: |
    Открывается уведомление о успешном заказе с кнопкой "Закрыть"

- summary: |
    Ошибка в смене языка интерфейса
  environment: |
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Во вкладке "Language" выбрать "Russian"
  expected-result: |
    Полностью весь интерфейс страницы станет на русском
  actual-result: |
    Интерфейс не весь на русском языке

- summary: |
    Некорректное отображение на мобильном устройстве
  environment: |
    Эмулятор мобильного устройства в Chrome DevTools 
    Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
    Windows 11 Домашняя 24H2
  steps-to-reproduce: |
    1. Открыть главную страницу приложения
    2. Включить эмуляцию мобильного устройства в DevTools
    3. Открыть страницу корзины с товаром
    4. Проверить отображение текста и кнопок на экране
  expected-result: |
    Интерфейс корректно отображается на мобильном устройстве
  actual-result: |
    Часть элементов отбражается некорректно: текст накладывается, элементы обрезаются, масштабирование работает неправильно

- summary: |
     Поиск не фильтрует каталог по введённой букве
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. В строке поиска ввести любую букву
  expected-result: |
      Откроется каталог товаров, название которых начинается с введённой буквы
  actual-result: |
      Отображаются все товары с введённой буквой

- summary: |
     Хештег не работает
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Открыть страницу товара
      2. Нажать на хештег с категорией
  expected-result: |
      Переход на страницу товаров по выбраному хештегу
  actual-result: |
      Ничего не происходит 

- summary: |
     Не закрывается окно оформления заказа
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Добавить товар в корзину
      2. Перейти в корзину и нажать оформление заказа
      3. Закрыть прявившееся окно с помощью крестика
  expected-result: |
      Окно закроется
  actual-result: |
      Окно не закрывается

- summary: |
     Ошибка 500 в DevTools
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Открыть каталог
      2. Запустить DevTools на вкладке Network 
      3. Добавить товар в корзину
      4. Перейти в корзину и нажать "Оформить заказ"
  expected-result: |
      В Network не должно быть ошибок
  actual-result: |
      Появляется ошибка 500

- summary: |
     Фильтр по цене не работает 
  environment: |
     Google Chrome Version 147.0.7727.138 (официальная сборка) (64 бит)
     Windows 11 Домашняя 24H2
  steps-to-reproduce: |
      1. Открыть каталог
      2. Выставить в фильтре ценовой диапазон
  expected-result: |
      Каталог товаров отфильтруется по обычной цене
  actual-result: |
     Каталог фильтруется только по скидочной цене
